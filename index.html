<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <script defer src="./app.js"></script>

  <title>Frontend Mentor | Product list with cart</title>

  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <h1>Desserts</h1>

  <div id="body-content">
    <div id="product-list">

    </div>
      
    <div id="cart-card">
        <h2 class="cartValue">Your Cart (0)</h2>
        <div id="empty-cart">
          <img src="./assets/images/illustration-empty-cart.svg" alt="emptyCart">
          <p>Your added items will appear here</p>
        </div>
        <div id="show-cart" class="hide">
          <div class="cartCardInfoContainerMain">
            <div class="blocker">
              
            </div>
          </div>
          <div id="order-total">
            <p>Order Total</p>
            <h2 class="totalCartPrice">$0</h2>
          </div>
          <div class="carbonNote">
            <div class="carbonNote2">
              <img id="carbon-neutral-icon" src="./assets/images/icon-carbon-neutral.svg" alt="carbon neutral icon">
              <p>This is a <span style="font-weight: bold;">carbon-neutral</span> delivery</p>
            </div>
          </div>
          <button id="confirm-order">Confirm Order</button>
        </div>
          
        <div class="orderModalContainer">
          <div id="overlay">
          <div id="order-modal">
              <div id="modal-content">
                <img id="order-confirm-image" src="./assets/images/icon-order-confirmed.svg" alt="confirmed order icon">
                <h2>Order Confirmed</h2>
                <p>We hope you enjoy your food!</p>
                <div id="modal-cart-holder">
                  <div id="modal-cart-info">
                    
                  </div>
                  <div id="cart-total-holder">
                    <div id="cart-total-identifier">Order Total</div>
                    <div id="cart-total"></div>
                  </div>
                </div>
                <form method="dialog">
                  <button id="modal-button">Start New Order</button>
                </form>
              </div>
            </div>
          </div>
        </div>
    </div>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/justzaid">Zaid</a>.
  </div>
</body>
</html>
